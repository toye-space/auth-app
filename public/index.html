<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="auth-container">

      <!-- Logo -->
      <div class="logo">AuthApp</div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div class="form-box" id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="john@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Your password" />
        </div>
        <button class="btn" onclick="login()">Login</button>
        <p class="feedback" id="login-feedback"></p>
      </div>

      <!-- Signup Form -->
      <div class="form-box hidden" id="signup-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signup-username" placeholder="johndoe" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="john@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" />
        </div>
        <button class="btn" onclick="signup()">Create Account</button>
        <p class="feedback" id="signup-feedback"></p>
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
